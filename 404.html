<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NMWGEPBMND"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NMWGEPBMND');
  </script>
  <title>404 ページが見つかりません | GRASTA EXPO</title>
  <link rel="icon" href="logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="logo.png" />
  <meta name="robots" content="noindex" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload"
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;500;600&family=Montserrat:wght@300;400;700;900&display=swap"
        as="style"
        onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;500;600&family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet" />
  </noscript>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #f8f6f2;
      --ink:   #1a1612;
      --ink2:  #5a5450;
      --ink3:  #9a9390;
      --pink:  #B51748;
      --border: rgba(26,22,18,.1);
      --display: 'Cinzel', serif;
      --mincho:  'Shippori Mincho', serif;
      --sans:    'Noto Sans JP', sans-serif;
      --mono:    'Montserrat', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: var(--sans);
      color: var(--ink);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .err-code {
      font-family: var(--mono);
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 900;
      letter-spacing: -.02em;
      line-height: 1;
      background: linear-gradient(135deg, var(--pink) 0%, #7b1fa2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    .err-label {
      font-family: var(--display);
      font-size: .72rem;
      letter-spacing: .35em;
      color: var(--ink3);
      margin-bottom: 2.5rem;
    }

    .err-title {
      font-family: var(--mincho);
      font-size: clamp(1.3rem, 3vw, 1.8rem);
      font-weight: 500;
      letter-spacing: .08em;
      color: var(--ink);
      margin-bottom: 1rem;
    }

    .err-body {
      font-size: .95rem;
      color: var(--ink2);
      line-height: 1.9;
      max-width: 400px;
      margin-bottom: 3rem;
    }

    .btn {
      display: inline-block;
      padding: .85rem 2.4rem;
      border-radius: 50px;
      font-family: var(--display);
      font-size: .78rem;
      letter-spacing: .18em;
      text-decoration: none;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .8; }
    .btn-pink {
      background: var(--pink);
      color: #fff;
    }
    .btn-outline {
      border: 1.5px solid var(--border);
      color: var(--ink2);
      margin-left: .8rem;
    }

    .deco-line {
      width: 40px;
      height: 1px;
      background: var(--pink);
      margin: 0 auto 2rem;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0; right: 0;
      text-align: center;
      font-size: .75rem;
      color: var(--ink3);
      letter-spacing: .06em;
    }
  </style>
</head>
<body>

  <p class="err-code">404</p>
  <p class="err-label">PAGE NOT FOUND</p>
  <div class="deco-line"></div>
  <h1 class="err-title">ページが見つかりません</h1>
  <p class="err-body">
    お探しのページは移動または削除された可能性があります。<br>
    URLをご確認のうえ、トップページへお戻りください。
  </p>
  <div>
    <a href="index.html" class="btn btn-pink">トップページへ戻る</a>
    <a href="ticket.html" class="btn btn-outline">チケットを見る</a>
  </div>

  <footer>© 2026 合同会社グラステ / GRASTA LLC.</footer>

</body>
</html>
